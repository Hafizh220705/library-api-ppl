name: Node.js CI-CD-CS Pipeline

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: library_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      # --- TAHAP 1: CS (Continuous Security) ---
      - name: Security Audit (npm audit)
        run: npm audit --audit-level=high

      - name: Static Analysis (njsscan)
        uses: ajinabraham/njsscan-action@v0.0.3
        with:
          args: '.'

      # --- TAHAP 2: CI (Continuous Integration) ---
      - name: Run Unit Tests
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/library_db
          PORT: 3000
        run: npm test

      # --- TAHAP 3: CD (Continuous Deployment - Simulation) ---
      - name: Build Docker Image
        run: docker build -t library-api:latest .